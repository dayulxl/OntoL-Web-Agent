{% extends "base.html" %}
{% block title %}本体语义 — LangGraph Cluster{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', path='js-treeview.css') }}">
<style>
/* ============================================================
   本体语义 — 左树 / 右详情 布局
   ============================================================ */
.container { max-width: none !important; margin: 0 !important; padding: 0 !important; }
footer { display: none; }

.ot-layout { display: flex; height: calc(100vh - 60px); position: relative; z-index: 1; }

/* ============================================================
   左侧面板 — js-treeview
   ============================================================ */
.ot-sidebar {
    width: 400px; min-width: 400px;
    background: rgba(8, 12, 32, 0.96);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; overflow: hidden;
    backdrop-filter: blur(12px);
}

.ot-sidebar-header {
    padding: 0.8rem 1rem 0.5rem;
    border-bottom: 1px solid rgba(0, 212, 255, 0.08);
    flex-shrink: 0;
}
.ot-sidebar-title {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-dim); margin-bottom: 0.4rem; font-weight: 600;
}

/* 工具栏 */
.sb-toolbar { display: flex; gap: 0.3rem; flex-wrap: wrap; align-items: center; }
.sb-toolbar .sb-btn {
    font-size: 0.68rem; padding: 0.25rem 0.55rem;
    border: 1px solid var(--border); border-radius: 4px;
    background: rgba(0, 212, 255, 0.06); color: var(--text-dim);
    cursor: pointer; transition: all 0.15s; font-family: inherit; white-space: nowrap;
}
.sb-toolbar .sb-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(0, 212, 255, 0.12); }
.sb-toolbar .sb-btn.accent { background: rgba(0,212,255,0.15); border-color: var(--accent); color: var(--accent); }
.sb-toolbar .sb-search {
    background: rgba(0, 212, 255, 0.04); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-size: 0.7rem;
    padding: 0.2rem 0.5rem; width: 100%; outline: none; font-family: inherit;
}
.sb-toolbar .sb-search:focus { border-color: var(--accent); }
.sb-toolbar .sb-search::placeholder { color: var(--text-dim); opacity: 0.5; }

/* 树容器 */
.sb-tree-wrap {
    flex: 1; overflow-y: auto; overflow-x: auto; padding: 0.5rem 0.8rem;
}
.sb-tree-wrap::-webkit-scrollbar { width: 5px; height: 5px; }
.sb-tree-wrap::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.12); border-radius: 3px; }

/* ── js-treeview 暗色主题 ── */
.sb-tree-wrap .tree-leaf { position: relative; padding: 1px 0; }
.sb-tree-wrap .tree-child-leaves { display: block; margin-left: 20px; }
.sb-tree-wrap .tree-child-leaves.hidden { display: none; }

.sb-tree-wrap .tree-leaf-content {
    display: flex; align-items: center; gap: 6px;
    padding: 3px 6px; border-radius: 4px; cursor: pointer;
    transition: background 0.12s; user-select: none;
}
.sb-tree-wrap .tree-leaf-content:hover { background: rgba(0, 212, 255, 0.08); }
.sb-tree-wrap .tree-leaf-content.selected { background: rgba(0, 212, 255, 0.14); }

.sb-tree-wrap .tree-expando {
    background: rgba(0, 212, 255, 0.12); border-radius: 3px;
    cursor: pointer; width: 16px; height: 16px; min-width: 16px;
    line-height: 16px; text-align: center; font-size: 10px;
    color: var(--text-dim); font-weight: bold; flex-shrink: 0;
}
.sb-tree-wrap .tree-expando:hover { background: rgba(0, 212, 255, 0.3); color: var(--accent); }
.sb-tree-wrap .tree-expando.hidden { visibility: hidden; }

.sb-tree-wrap .tree-leaf-text {
    cursor: pointer; font-size: 0.82rem; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sb-tree-wrap .tree-leaf-text:hover { color: var(--accent); }

/* 节点徽标 */
.sb-tree-wrap .leaf-badges { display: flex; gap: 0.25rem; margin-left: auto; flex-shrink: 0; }
.sb-tree-wrap .leaf-badge {
    font-size: 0.6rem; padding: 0.1rem 0.4rem; border-radius: 8px;
    border: 1px solid var(--border); color: var(--text-dim); white-space: nowrap;
}
.sb-tree-wrap .leaf-badge.type  { border-color: rgba(0,212,255,0.25); color: var(--accent); }
.sb-tree-wrap .leaf-badge.count { border-color: rgba(124,58,237,0.25); color: #a78bfa; }

/* 选中状态 */
.sb-tree-wrap .tree-leaf-content.selected .tree-leaf-text { color: var(--accent); }

/* 状态信息 */
.ot-sidebar-footer {
    padding: 0.5rem 1rem; border-top: 1px solid rgba(0, 212, 255, 0.08);
    font-size: 0.68rem; color: var(--text-dim); flex-shrink: 0;
    display: flex; align-items: center; gap: 0.5rem;
}
.ot-status-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.ot-status-dot.offline { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }

/* ============================================================
   右侧面板 — 详情
   ============================================================ */
.ot-main {
    flex: 1; overflow-y: auto; padding: 2rem 2.5rem;
    background:
        radial-gradient(ellipse at 70% 20%, rgba(0, 212, 255, 0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 30% 80%, rgba(124, 58, 237, 0.03) 0%, transparent 60%);
}
.ot-main::-webkit-scrollbar { width: 6px; }
.ot-main::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.12); border-radius: 3px; }

.ot-empty {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100%; text-align: center; color: var(--text-dim);
}
.ot-empty .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.35; animation: float 3s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
.ot-empty h2 { color: #fff; font-size: 1.3rem; margin-bottom: 0.5rem; }
.ot-empty p { max-width: 360px; font-size: 0.85rem; line-height: 1.7; }
.ot-empty .hotkeys { display: flex; gap: 1.2rem; margin-top: 1.5rem; font-size: 0.75rem; }
.ot-empty .hotkey { display: flex; align-items: center; gap: 0.3rem; color: var(--text-dim); }
.ot-empty .hotkey kbd { background: rgba(0,212,255,0.08); border: 1px solid var(--border); border-radius: 3px; padding: 0.1rem 0.4rem; font-size: 0.7rem; color: var(--accent); font-family: inherit; }

.ot-detail-header { margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
.ot-detail-header .breadcrumb { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem; }
.ot-detail-header .breadcrumb span { color: var(--accent); }
.ot-detail-header h1 { font-size: 1.8rem; margin-bottom: 0.4rem; }
.ot-detail-header .desc { color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; }
.ot-detail-header .meta-tags { display: flex; gap: 0.5rem; margin-top: 0.8rem; flex-wrap: wrap; }
.ot-tag { padding: 0.2rem 0.6rem; border-radius: 4px; font-size: 0.72rem; border: 1px solid var(--border); color: var(--text-dim); background: rgba(0,212,255,0.04); }

.ot-section { margin-bottom: 2rem; }
.ot-section h3 { display: flex; align-items: center; gap: 0.5rem; font-size: 1rem; margin-bottom: 1rem; color: var(--text); }
.ot-section h3 .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--primary-glow); }

.ot-prop-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.ot-prop-table th { text-align: left; padding: 0.5rem 0.7rem; background: rgba(0,212,255,0.05); color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
.ot-prop-table td { padding: 0.5rem 0.7rem; border-bottom: 1px solid rgba(0,212,255,0.06); color: var(--text); font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace; font-size: 0.78rem; }
.ot-prop-table tr:hover td { background: rgba(0,212,255,0.03); }
.ot-prop-table tr.ot-attr-row { cursor: pointer; }
.ot-prop-table tr.ot-attr-row:hover td { background: rgba(0,212,255,0.08); }

.ot-actions { display: flex; gap: 0.6rem; margin-top: 1rem; flex-wrap: wrap; }
.ot-actions .btn { font-size: 0.82rem; padding: 0.5rem 1rem; }
.btn-accent { background: rgba(0,212,255,0.15) !important; border-color: var(--accent) !important; color: var(--accent) !important; }
.btn-accent:hover { background: rgba(0,212,255,0.28) !important; }

.ot-loading { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--text-dim); gap: 0.6rem; }
.ot-spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.ot-error { padding: 1rem; margin: 1rem 0; background: rgba(239,68,68,0.06); border: 1px solid rgba(239,68,68,0.2); border-radius: 6px; color: #f87171; font-size: 0.82rem; }

/* 移动弹窗 */
.ot-move-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 300; display: none; align-items: center; justify-content: center; }
.ot-move-overlay.open { display: flex; }
.ot-move-box { background: var(--bg-mid); border: 1px solid var(--border); border-radius: 12px; padding: 1.8rem; width: 560px; max-width: 95vw; max-height: 80vh; display: flex; flex-direction: column; }
.ot-move-box h4 { margin: 0 0 1rem; color: var(--accent); font-size: 1.05rem; }
.ot-move-tree { flex: 1; overflow-y: auto; max-height: 55vh; padding: 0.5rem; }
.ot-move-tree .mtree-item { padding: 0.45rem 0.6rem; cursor: pointer; border-radius: 4px; font-size: 0.9rem; color: var(--text); transition: all 0.12s; display: flex; align-items: center; gap: 0.4rem; }
.ot-move-tree .mtree-item:hover { background: rgba(0,212,255,0.08); }
.ot-move-tree .mtree-item.selected { background: rgba(0,212,255,0.14); color: var(--accent); }
.ot-move-tree .mtree-item.current { opacity: 0.4; cursor: not-allowed; }
.ot-move-tree .mtree-item.lvl0 { margin-left: 0; }
.ot-move-tree .mtree-item.lvl1 { margin-left: 1.2rem; }
.ot-move-tree .mtree-item.lvl2 { margin-left: 2.4rem; }
.ot-move-tree .mtree-item.lvl3 { margin-left: 3.6rem; }
.ot-move-box .btn-row { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; padding-top: 0.8rem; border-top: 1px solid var(--border); }
.ot-move-box .btn-row .btn { font-size: 0.9rem; padding: 0.5rem 1.2rem; }

@media (max-width: 900px) { .ot-sidebar { width: 300px; min-width: 300px; } .ot-main { padding: 1.5rem; } }
</style>
{% endblock %}


{% block content %}
<div class="ot-layout">

    <!-- ================================================================
         左侧 — js-treeview 本体树
         ================================================================ -->
    <aside class="ot-sidebar">
        <div class="ot-sidebar-header">
            <div class="ot-sidebar-title" style="display:flex;justify-content:space-between;align-items:center;">
                <span>🌳 本体模型树</span>
                <button class="sb-btn accent" onclick="showCreateRootForm()">＋ 新建</button>
            </div>
            <div class="sb-toolbar">
                <button class="sb-btn" onclick="treeView.expandAll()" title="全部展开">📂</button>
                <button class="sb-btn" onclick="treeView.collapseAll()" title="全部折叠">📁</button>
                <input class="sb-search" type="text" id="treeSearch" placeholder="搜索本体名称..."
                       oninput="filterTreeNodes(this.value)" />
            </div>
        </div>
        <div class="sb-tree-wrap" id="sidebarTree"></div>
        <div class="ot-sidebar-footer">
            <span class="ot-status-dot" id="graphDot"></span>
            <span id="graphStatus">检查连接...</span>
            <span style="margin-left:auto;" id="nodeCountSmall">—</span>
        </div>
    </aside>

    <!-- ================================================================
         右侧 — 详情区域 (保持原样)
         ================================================================ -->
    <main class="ot-main" id="mainPanel">
        <div class="ot-empty" id="emptyState">
            <div class="icon">🗂️</div>
            <h2>本体语义管理</h2>
            <p>左侧为本体模型树 — 点击 <b>+/-</b> 展开折叠，点击名称查看详情。右侧显示模型 Schema 和字段定义。</p>
            <div class="tech-line" style="width:200px;"></div>
            <div class="hotkeys">
                <span class="hotkey"><kbd>Esc</kbd> 清除选择</span>
            </div>
        </div>
        <div id="detailContent" style="display:none;"></div>
    </main>

</div>
{% endblock %}


{% block extra_scripts %}
<script src="{{ url_for('static', path='js-treeview.js') }}"></script>
<script>
// 后端预加载的本体树数据 (js-treeview 格式)
var ONTOLOGY_TREE_DATA = {{ ontology_tree_json | safe }};
</script>
<script>
// ====================================================================
// API / 常量
// ====================================================================
var API_MODEL = '/api/v1/ontology-models';
var MODEL_TYPE_LABEL = {M1:'对象',M2:'行为',M3:'规则',M4:'场景',M5:'主体',M6:'异常补偿',M7:'质量约束',ME:'事件',MT:'模板'};
var MODEL_STATUS_LABEL = {'0':'启用中','1':'已停用'};
var DATA_TYPE_LABEL = {'VARCHAR':'字符串','INTEGER':'整数','FLOAT':'浮点数','DATETIME':'时间'};
var REQ_FLAG_LABEL = {'0':'不必填','1':'必填'};
var UNIQ_FLAG_LABEL = {'0':'否','1':'是'};

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

async function apiGet(url) { var r = await fetch(url); if (!r.ok) throw new Error((await r.json()).detail || r.statusText); return r.json(); }
async function apiPost(url, body) { var r = await fetch(url, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if (!r.ok) throw new Error((await r.json()).detail || r.statusText); return r.json(); }
async function apiPut(url, body) { var r = await fetch(url, {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}); if (!r.ok) throw new Error((await r.json()).detail || r.statusText); return r.json(); }
async function apiDel(url) { var r = await fetch(url, {method:'DELETE'}); if (!r.ok) throw new Error((await r.json()).detail || r.statusText); return r.json(); }

// ====================================================================
// 全局状态
// ====================================================================
var activeModel = null;
var treeData = [];
var treeView = null; // TreeView 实例

// ====================================================================
// 左侧 — js-treeview 初始化
// ====================================================================

/** 给每个 leaf-content 追加徽标 */
function decorateTreeNodes() {
    var nodes = document.querySelectorAll('#sidebarTree .tree-leaf-content');
    for (var i = 0; i < nodes.length; i++) {
        var content = nodes[i];
        if (content.querySelector('.leaf-badges')) continue;
        try {
            var item = JSON.parse(content.getAttribute('data-item'));
            if (!item || !item.id) continue;
            var badges = document.createElement('span');
            badges.className = 'leaf-badges';
            if (item.typeCode) {
                var typeLabel = MODEL_TYPE_LABEL[item.typeCode] || item.typeCode;
                badges.innerHTML += '<span class="leaf-badge type">' + escHtml(typeLabel) + '</span>';
            }
            if (item.fieldCount > 0) {
                badges.innerHTML += '<span class="leaf-badge count">' + item.fieldCount + '字段</span>';
            }
            content.appendChild(badges);
        } catch(e) {}
    }
}

/** 点击任何 tree-leaf-content → 加载模型详情 */
function bindTreeClicks() {
    var nodes = document.querySelectorAll('#sidebarTree .tree-leaf-content');
    for (var i = 0; i < nodes.length; i++) {
        nodes[i].addEventListener('click', function(e) {
            try {
                var item = JSON.parse(this.getAttribute('data-item'));
                if (item && item.id) {
                    selectTreeNode(this, item.id);
                }
            } catch(ex) {}
        });
    }
}

/** 选中树节点 + 加载详情 */
function selectTreeNode(contentEl, modelId) {
    // 清除旧选中
    var all = document.querySelectorAll('#sidebarTree .tree-leaf-content');
    for (var i = 0; i < all.length; i++) { all[i].classList.remove('selected'); }
    contentEl.classList.add('selected');
    _loadModelDetail(modelId);
}

/** 加载模型详情到右侧 */
function _loadModelDetail(modelId) {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('detailContent').style.display = 'block';
    document.getElementById('detailContent').innerHTML = '<div class="ot-loading"><div class="ot-spinner"></div>加载详情...</div>';
    document.getElementById('mainPanel').scrollTop = 0;

    apiGet(API_MODEL + '/' + encodeURIComponent(modelId) + '?with_attrs=true').then(function(model) {
        activeModel = model;
        renderDetail(model);
    }).catch(function(e) {
        var node = treeData.find(function(n) { return n.id === modelId; });
        if (node) renderDetail(node);
        else document.getElementById('detailContent').innerHTML = '<div class="ot-error">加载失败: ' + escHtml(e.message) + '</div>';
    });
}

/** 搜索过滤 */
var _filterTimeout = null;
function filterTreeNodes(kw) {
    clearTimeout(_filterTimeout);
    _filterTimeout = setTimeout(function() { _doFilter(kw); }, 200);
}
function _doFilter(kw) {
    kw = (kw || '').trim().toLowerCase();
    var leaves = document.querySelectorAll('#sidebarTree .tree-leaf');
    for (var i = 0; i < leaves.length; i++) {
        var leaf = leaves[i];
        var content = leaf.querySelector(':scope > .tree-leaf-content');
        if (!content) continue;
        try {
            var item = JSON.parse(content.getAttribute('data-item'));
            var name = (item.name || '').toLowerCase();
            var id = (item.id || '').toLowerCase();
            var match = !kw || name.indexOf(kw) >= 0 || id.indexOf(kw) >= 0;
            // 检查子节点
            var childLeaves = leaf.querySelectorAll('.tree-leaf');
            var childMatch = false;
            for (var j = 0; j < childLeaves.length; j++) {
                var cc = childLeaves[j].querySelector(':scope > .tree-leaf-content');
                if (!cc) continue;
                try {
                    var ci = JSON.parse(cc.getAttribute('data-item'));
                    var cn = (ci.name || '').toLowerCase();
                    var ciid = (ci.id || '').toLowerCase();
                    if (!kw || cn.indexOf(kw) >= 0 || ciid.indexOf(kw) >= 0) childMatch = true;
                } catch(e) {}
            }
            leaf.style.display = (match || childMatch) ? '' : 'none';
            // 有匹配子节点则展开父节点
            if (childMatch && !match) {
                var childDiv = leaf.querySelector(':scope > .tree-child-leaves');
                if (childDiv && childDiv.classList.contains('hidden')) {
                    childDiv.classList.remove('hidden');
                    var expando = content.querySelector('.tree-expando');
                    if (expando) { expando.textContent = '-'; expando.classList.add('expanded'); }
                }
            }
        } catch(e) {}
    }
}

// ====================================================================
// 右侧 — 模型详情 (保持原样)
// ====================================================================

function resetSelection() {
    activeModel = null;
    document.getElementById('detailContent').style.display = 'none';
    document.getElementById('emptyState').style.display = 'flex';
    document.getElementById('mainPanel').scrollTop = 0;
    var all = document.querySelectorAll('#sidebarTree .tree-leaf-content');
    for (var i = 0; i < all.length; i++) { all[i].classList.remove('selected'); }
}

function renderDetail(model) {
    var de = document.getElementById('detailContent');
    var typeLabel = MODEL_TYPE_LABEL[model.ontol_model_type] || model.ontol_model_type || '—';
    var statusLabel = MODEL_STATUS_LABEL[model.ontol_model_status] || model.ontol_model_status;
    var attrs = model.attributes || [];
    var presetAttrs = attrs.filter(function(a) { return a.attr_is_system === '1'; });
    var customAttrs = attrs.filter(function(a) { return a.attr_is_system !== '1'; });

    function attrTable(list, readonly, mId) {
        if (list.length === 0) return '<p style="color:var(--text-dim);font-size:0.82rem;">无</p>';
        return '<table class="ot-prop-table"><thead><tr><th>编码</th><th>名称</th><th>类型</th><th>长度</th><th>必填</th><th>唯一</th><th>默认值</th><th>操作</th></tr></thead><tbody>' +
            list.map(function(a) {
                return '<tr class="ot-attr-row" onclick="showAttrDetail(\'' + a.id + '\',\'' + mId + '\')" title="点击查看字段详情">' +
                    '<td><code>' + escHtml(a.code) + '</code></td>' +
                    '<td>' + escHtml(a.name) + '</td>' +
                    '<td>' + (DATA_TYPE_LABEL[a.attr_data_type]||a.attr_data_type) + '</td>' +
                    '<td>' + (a.attr_length||'—') + '</td>' +
                    '<td>' + (REQ_FLAG_LABEL[a.attr_required]||a.attr_required) + '</td>' +
                    '<td>' + (UNIQ_FLAG_LABEL[a.attr_is_only]||'—') + '</td>' +
                    '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;" title="' + escHtml(a.attr_default_value||'') + '">' + escHtml(a.attr_default_value||'—') + '</td>' +
                    '<td onclick="event.stopPropagation()">' + (readonly
                        ? '<span style="font-size:0.65rem;color:var(--text-dim);opacity:0.5;" title="预置字段不可修改">🔒 系统预设</span>'
                        : '<button onclick="editAttr(\'' + a.id + '\')" style="font-size:0.65rem;padding:0.1rem 0.4rem;" title="编辑">✏</button> ' +
                          '<button onclick="moveAttr(\'' + a.id + '\',\'' + escHtml(a.name) + '\',\'' + escHtml(mId) + '\')" style="font-size:0.65rem;padding:0.1rem 0.4rem;border-color:#f59e0b;color:#f59e0b;" title="移动到其他本体">📦</button> ' +
                          '<button onclick="deleteAttr(\'' + a.id + '\',\'' + escHtml(a.name) + '\')" style="font-size:0.65rem;padding:0.1rem 0.4rem;border-color:#ef4444;color:#ef4444;" title="删除">✕</button>') +
                    '</td></tr>';
            }).join('') + '</tbody></table>';
    }

    de.innerHTML =
        '<div class="ot-detail-header">' +

    if (!options) { alert('没有可移入的本体'); return; }
    var overlay = document.createElement('div'); overlay.className = 'ot-move-overlay open';
    overlay.innerHTML = '<div class="ot-move-box"><h4>📦 移动字段: "' + escHtml(attrName) + '"</h4><label style="font-size:0.75rem;color:var(--text-dim);">目标本体</label><select id="moveTarget" size="8">' + options + '</select><div class="btn-row"><button class="btn" onclick="this.closest(\'.ot-move-overlay\').remove()">取消</button><button class="btn btn-accent" id="confirmMoveBtn">移动</button></div></div>';
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.getElementById('confirmMoveBtn').addEventListener('click', async function() {
        var tid = document.getElementById('moveTarget')?.value;
        if (!tid) return;

    });
}

    (function collect(pid) { fullTree.filter(function(n) { return n.ontol_parent_id === pid && n.delete_flag !== '1'; }).forEach(function(c) { childIds.add(c.id); collect(c.id); }); })(modelId);

    function tHTML(pid, lvl) {
        return fullTree.filter(function(n) { return n.ontol_parent_id === (pid||null) && n.delete_flag !== '1'; }).map(function(n) {
            var blocked = childIds.has(n.id);
            return '<div class="mtree-item lvl' + Math.min(lvl,3) + (blocked?' current':'') + '" data-id="' + n.id + '"' + (blocked?' title="不能移到自身或子孙"':'') + '><span class="micon">' + (blocked?'🚫':'📄') + '</span><span>' + escHtml(n.name) + ' <span style="color:var(--text-dim);font-size:0.7rem;">' + (MODEL_TYPE_LABEL[n.ontol_model_type]||'') + '</span></span></div>' + tHTML(n.id, lvl+1);
        }).join('');
    }
    var overlay = document.createElement('div'); overlay.className = 'ot-move-overlay open';
    overlay.innerHTML = '<div class="ot-move-box"><h4>↗ 移动 "' + escHtml(modelName) + '" 到...</h4><div class="ot-move-tree"><div class="mtree-item lvl0" data-id=""><span class="micon">📁</span><span><b>根节点</b></span></div>' + tHTML(null,0) + '</div><div class="btn-row"><button class="btn" onclick="this.closest(\'.ot-move-overlay\').remove()">取消</button><button class="btn btn-accent" id="confirmMoveModelBtn">移动</button></div></div>';
    document.body.appendChild(overlay);
    overlay.querySelectorAll('.mtree-item:not(.current)').forEach(function(el) { el.addEventListener('click', function() { selId = el.dataset.id; overlay.querySelectorAll('.mtree-item:not(.current)').forEach(function(x) { x.classList.remove('selected'); }); el.classList.add('selected'); }); });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
    document.getElementById('confirmMoveModelBtn').addEventListener('click', async function() {
        if (selId === undefined) { alert('请选择目标'); return; }
        try { await apiPut(API_MODEL + '/' + encodeURIComponent(modelId), {ontol_parent_id: selId||null, update_id:'admin'}); overlay.remove(); await refreshAfterChange(); }
        catch(e) { alert('移动失败: ' + e.message); }
    });
}

function showToast(msg) {
    var t = document.createElement('div');
    t.style.cssText = 'position:fixed;top:80px;right:1.5rem;padding:0.6rem 1rem;border-radius:8px;font-size:0.82rem;z-index:999;background:rgba(34,197,94,0.2);border:1px solid rgba(34,197,94,0.4);color:#22c55e;';
    t.textContent = msg; document.body.appendChild(t);
    setTimeout(function() { t.style.opacity='0';t.style.transition='opacity 0.3s'; },2000);
    setTimeout(function() { t.remove(); },2500);
}

// ====================================================================
// 根节点创建
// ====================================================================

function showCreateRootForm() {
    document.getElementById('emptyState').style.display = 'none';
    document.getElementById('detailContent').style.display = 'block';
    var typeOpts = Object.entries(MODEL_TYPE_LABEL).map(function(e) { return '<option value="' + e[0] + '">' + e[0] + ' — ' + e[1] + '</option>'; }).join('');
    document.getElementById('detailContent').innerHTML =
        '<div class="ot-detail-header"><h1>新建根本体</h1><p class="desc">创建顶级本体模型（无父级）</p></div>' +
        '<div style="max-width:500px;">' +
            '<label>本体编码 <span style="color:#ef4444;">*</span></label><input id="f-code" placeholder="唯一编码" style="width:100%;margin-bottom:0.6rem;" />' +
            '<label>名称 <span style="color:#ef4444;">*</span></label><input id="f-name" placeholder="本体名称" style="width:100%;margin-bottom:0.6rem;" />' +
            '<label>类型 <span style="color:#ef4444;">*</span></label><select id="f-type" style="width:100%;margin-bottom:0.6rem;">' + typeOpts + '</select>' +
            '<label>描述</label><input id="f-desc" placeholder="本体描述" style="width:100%;margin-bottom:1rem;" />' +
            '<div class="ot-actions"><button class="btn btn-accent" onclick="createRootModel()">创建</button><button class="btn" onclick="resetSelection()">取消</button></div>' +
        '</div>';
    document.getElementById('mainPanel').scrollTop = 0;
}

async function createRootModel() {
    var code = (document.getElementById('f-code')?.value||'').trim();
    var name = (document.getElementById('f-name')?.value||'').trim();
    if (!code || !name) { alert('请填写本体编码和名称'); return; }
    try {
        await apiPost(API_MODEL, {code:code, name:name, ontol_model_type: document.getElementById('f-type')?.value, ontol_parent_id:null, ontol_model_desc: (document.getElementById('f-desc')?.value||'').trim()||null, create_id:'admin'});
        await refreshAfterChange();
    } catch(e) { alert('创建失败: ' + e.message); }
}

// ====================================================================
// 数据刷新
// ====================================================================

async function refreshAfterChange() {
    try {
        var data = await apiGet(API_MODEL + '/tree?with_attrs=true');
        treeData = data;
        updateFooter(data);
        // 重新初始化树（传入最新数据，而非预加载的旧数据）
        initTreeView(data);
        if (activeModel) {
            try {
                var model = await apiGet(API_MODEL + '/' + encodeURIComponent(activeModel.id) + '?with_attrs=true');
                activeModel = model;
                renderDetail(model);
            } catch(e) {}
        }
    } catch(e) { console.error('刷新失败:', e); }
}

function updateFooter(tree) {
    try {
        apiGet(API_MODEL + '/stats').then(function(s) {
            document.getElementById('graphDot').classList.remove('offline');
            document.getElementById('graphStatus').textContent = '数据库已连接 · ' + (s.model_count||0) + ' 模型';
            document.getElementById('nodeCountSmall').textContent = (s.attr_count||0) + ' 字段';
        }).catch(function() {
            document.getElementById('graphStatus').textContent = '数据库已连接 · ' + (tree?.length||0) + ' 节点';
        });
    } catch(_) {}
}

// ====================================================================
// 键盘 & 初始化
// ====================================================================

document.addEventListener('keydown', function(e) {
    if (document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'TEXTAREA' || document.activeElement?.tagName === 'SELECT') return;
    if (e.key === 'Escape') resetSelection();
    if (e.key === 'n' && e.ctrlKey) { e.preventDefault(); showCreateRootForm(); }
});

function initTreeView(data) {
    treeView = new TreeView(data || ONTOLOGY_TREE_DATA, 'sidebarTree');
    // 装饰节点(加徽标) + 绑定点击加载详情
    setTimeout(function() {
        decorateTreeNodes();
        bindTreeClicks();
    }, 50);
}

document.addEventListener('DOMContentLoaded', function() {
    // [FIX] 直接用服务端预加载的 ONTOLOGY_TREE_DATA 渲染树，不依赖不存在的 /tree API
    // 影响范围：页面首次加载时的左侧树渲染
    initTreeView();
    treeData = ONTOLOGY_TREE_DATA;
    updateFooter(ONTOLOGY_TREE_DATA);
});
</script>
{% endblock %}
