{% extends "base.html" %}
{% block title %}元数据管理 — LangGraph Cluster{% endblock %}

{% block extra_head %}
<style>
.container { max-width: none !important; margin: 0 !important; padding: 0 !important; }
footer { display: none; }

.dict-layout { display: flex; height: calc(100vh - 60px); background: rgba(8,12,32,0.96); }

/* 左侧词条分类 */
.dict-sidebar { width: 300px; min-width: 300px; border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.dict-sidebar-header { padding: 1rem 1rem 0.6rem; border-bottom: 1px solid rgba(0,212,255,0.08); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
.dict-sidebar-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); font-weight: 600; margin: 0; }
.dict-tree-wrap { flex: 1; overflow-y: auto; padding: 0.5rem 0; }
.dict-tree-item { display: flex; align-items: center; gap: 0.35rem; padding: 0.45rem 1rem; cursor: pointer; border-left: 3px solid transparent; font-size: 0.82rem; }
.dict-tree-item:hover { background: rgba(0,212,255,0.05); }
.dict-tree-item.active { border-left-color: var(--accent); background: rgba(0,212,255,0.08); }
.dict-tree-item .label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dict-tree-item .badge { font-size: 0.6rem; padding: 0.1rem 0.35rem; border-radius: 3px; flex-shrink: 0; }
.dict-tree-item .badge.sys { background: rgba(239,68,68,0.1); color: #ef4444; }
.dict-tree-item .badge.count { background: rgba(0,212,255,0.1); color: var(--accent); }
.dict-tree-item .btn-group { display: flex; gap: 2px; margin-left: auto; opacity: 0; transition: opacity 0.15s; }
.dict-tree-item:hover .btn-group { opacity: 1; }

/* 右侧词条列表 */
.dict-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.dict-main-header { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.dict-main-header h2 { margin: 0; font-size: 1rem; }
.dict-main-body { flex: 1; overflow-y: auto; padding: 1.2rem 1.5rem; }
.dict-empty { text-align: center; color: var(--text-dim); padding: 3rem 1rem; font-size: 0.85rem; }

.dict-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.dict-table th { text-align: left; padding: 0.5rem 0.8rem; background: rgba(0,212,255,0.05); color: var(--accent); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
.dict-table td { padding: 0.5rem 0.8rem; border-bottom: 1px solid rgba(0,212,255,0.06); color: var(--text); font-size: 0.8rem; }
.dict-table tr:hover td { background: rgba(0,212,255,0.03); }
.dict-table .content-cell { max-width: 320px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.dict-table .btn-group { display: flex; gap: 2px; opacity: 0; transition: opacity 0.15s; }
.dict-table tr:hover .btn-group { opacity: 1; }

/* 弹窗 */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal-box { background: rgba(8,12,32,0.98); border: 1px solid var(--accent); border-radius: 10px; padding: 1.8rem; width: 620px; max-width: 90vw; max-height: 85vh; overflow-y: auto; }
.modal-box h3 { margin: 0 0 1rem; color: var(--accent); font-size: 1rem; }
.modal-box label { display: block; font-size: 0.78rem; color: var(--text-dim); margin: 0.6rem 0 0.2rem; }
.modal-box input, .modal-box select, .modal-box textarea { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid var(--border); color: var(--text); padding: 0.5rem; border-radius: 4px; font-size: 0.82rem; outline: none; resize: vertical; }
.modal-box input:focus, .modal-box select:focus, .modal-box textarea:focus { border-color: var(--accent); }
.modal-box .btn-row { display: flex; gap: 0.6rem; margin-top: 1.2rem; }

.btn { padding: 0.35rem 0.8rem; border: 1px solid var(--border); border-radius: 5px; background: transparent; color: var(--text); cursor: pointer; font-size: 0.75rem; transition: all 0.2s; }
.btn:hover { border-color: var(--accent); }
.btn-accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
.btn-danger { border-color: #ef4444; color: #ef4444; }
.btn-sm { padding: 0.15rem 0.5rem; font-size: 0.65rem; }
.btn-ico { background: transparent; border: 1px solid var(--border); color: var(--text-dim); cursor: pointer; font-size: 0.55rem; padding: 0 3px; border-radius: 2px; line-height: 1.3; }
.btn-ico:hover { border-color: var(--accent); color: var(--accent); }
.btn-ico-danger { border-color: transparent; color: #ef4444; }
.btn-ico-danger:hover { border-color: #ef4444; }
</style>
{% endblock %}

{% block content %}
<div class="dict-layout">

    <!-- ═══ 左侧：词条分类 ═══ -->
    <aside class="dict-sidebar">
        <div class="dict-sidebar-header">
            <span class="dict-sidebar-title">📋 词条分类</span>
            <button class="btn btn-accent btn-sm" onclick="showTypeForm()">＋ 新建</button>
        </div>
        <div class="dict-tree-wrap" id="treeWrap">
            <div id="typeTree" style="text-align:center;color:var(--text-dim);padding:2rem;">加载中...</div>
        </div>
    </aside>

    <!-- ═══ 右侧：词条列表 ═══ -->
    <main class="dict-main">
        <div class="dict-main-header" id="mainHeader">
            <h2 style="color:var(--text-dim);">← 请选择左侧分类</h2>
        </div>
        <div class="dict-main-body" id="mainBody">
            <div class="dict-empty">选择左侧词条分类后此处显示该分类下的词条</div>
        </div>
    </main>
</div>

<div id="modalOverlay" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeModal()">
    <div class="modal-box" id="modalBox" onclick="event.stopPropagation()"></div>
</div>

<script>
var API_DICT_TYPE = '/api/v1/dictionary-types';
var API_DICT = '/api/v1/dictionaries';

var typeData = [];
var activeType = null;
var dictCountMap = {};

async function apiGet(url) { var r=await fetch(url,{cache:'no-cache'}); if(!r.ok)throw Error(await r.text()); return r.json(); }
async function apiPost(url,d) { var r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d),cache:'no-cache'}); if(!r.ok)throw Error(await r.text()); return r.json(); }
async function apiPut(url,d) { var r=await fetch(url,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d),cache:'no-cache'}); if(!r.ok)throw Error(await r.text()); return r.json(); }
async function apiDel(url) { var r=await fetch(url,{method:'DELETE',cache:'no-cache'}); if(!r.ok)throw Error(await r.text()); return r.json(); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── 初始化 ──
async function init(){
    try { typeData = await apiGet(API_DICT_TYPE); } catch(e){ console.error(e); }
    await refreshCounts();
    renderTypeTree();
}
init();

async function refreshCounts(){
    dictCountMap = {};
    var all = await apiGet(API_DICT);
    all.forEach(function(d){
        var tid = d.dictionary_type_id;
        if(tid){ dictCountMap[tid] = (dictCountMap[tid]||0) + 1; }
    });
}

// ── 渲染词条分类树 ──
function renderTypeTree(){
    var root = document.getElementById('typeTree');
    if(!typeData.length){ root.innerHTML = '<div style="text-align:center;color:var(--text-dim);padding:2rem;">暂无分类，点击「＋ 新建」创建</div>'; return; }
    var h = '';
    typeData.forEach(function(t){
        var isSys = t.is_system === '1';
        var isActive = activeType && activeType.id === t.id;
        var cnt = dictCountMap[t.id] || 0;
        h += '<div class="dict-tree-item' + (isActive?' active':'') + '" onclick="selectType(\x27' + t.id + '\x27)">' +
            '<span class="label">' + esc(t.name) + '</span>' +
            (cnt > 0 ? '<span class="badge count">' + cnt + '</span>' : '') +
            (isSys ? '<span class="badge sys">预设</span>' : '') +
            '<span class="btn-group" onclick="event.stopPropagation()">' +
                (isSys ? '' : '<button class="btn-ico" onclick="showTypeForm(\x27'+t.id+'\x27)" title="编辑">✏</button>') +
                (isSys ? '' : '<button class="btn-ico btn-ico-danger" onclick="delType(\x27'+t.id+'\x27)" title="删除">✕</button>') +
            '</span>' +
        '</div>';
    });
    root.innerHTML = h;
}

// ── 选择分类 → 加载词条 ──
async function selectType(typeId){
    activeType = typeData.find(function(t){ return t.id === typeId; });
    renderTypeTree();
    await loadDicts(typeId);
}

// ── 加载该分类下的所有词条 ──
async function loadDicts(typeId){
    var body = document.getElementById('mainBody');
    var hdr = document.getElementById('mainHeader');
    try {
        // 拉取所有带该 type_id 的词条
        var all = await apiGet(API_DICT);
        var dicts = all.filter(function(d){ return d.dictionary_type_id === typeId; });
        var title = activeType ? esc(activeType.name) : typeId;
        hdr.innerHTML = '<h2>📖 ' + title + ' <span style="font-size:0.72rem;color:var(--text-dim);">(' + dicts.length + ' 条)</span></h2>' +
            '<button class="btn btn-accent btn-sm" onclick="showDictForm()">＋ 新建词条</button>';

        if(!dicts.length){ body.innerHTML = '<div class="dict-empty">该分类下尚无词条，点击右上角「＋ 新建词条」创建</div>'; return; }

        body.innerHTML = '<table class="dict-table"><thead><tr><th>编码</th><th>词条名称</th><th>内容</th><th>时间</th><th style="width:60px;">操作</th></tr></thead><tbody>' +
            dicts.map(function(d){
                return '<tr>' +
                    '<td><code>' + esc(d.code||'—') + '</code></td>' +
                    '<td>' + esc(d.name) + '</td>' +
                    '<td class="content-cell" title="' + esc(d.dictionary_content||'') + '">' + esc(d.dictionary_content||'—') + '</td>' +
                    '<td>' + (d.create_time||'').substring(0,10) + '</td>' +
                    '<td><span class="btn-group">' +
                        '<button class="btn btn-sm" onclick="showDictForm(\x27' + d.id + '\x27)">✏</button>' +
                        '<button class="btn btn-sm btn-danger" onclick="delDict(\x27' + d.id + '\x27)">✕</button>' +
                    '</span></td></tr>';
            }).join('') + '</tbody></table>';
    } catch(e) { body.innerHTML = '<div class="dict-empty">加载失败: ' + esc(e.message) + '</div>'; }
}

// ═══════════════════════════════════════════════
//  词条分类 增删改
// ═══════════════════════════════════════════════

function showTypeForm(typeId){
    var isEdit = !!typeId;
    var ex = {};
    if(isEdit){ ex = typeData.find(function(t){return t.id===typeId;}) || {}; }
    document.getElementById('modalBox').innerHTML =
        '<h3>' + (isEdit ? '编辑词条分类' : '新建词条分类') + '</h3>' +
        '<label>分类名称 <span style="color:#ef4444;">*</span></label>' +
        '<input id="ft-name" value="' + esc(ex.name||'') + '" placeholder="分类名称" maxlength="200" />' +
        '<label>描述</label>' +
        '<input id="ft-desc" value="' + esc(ex.dictionary_description||'') + '" placeholder="分类描述" maxlength="500" />' +
        '<div class="btn-row">' +
            '<button class="btn btn-accent" onclick="' + (isEdit ? 'updType(\x27'+typeId+'\x27)' : 'addType()') + '">💾 保存</button>' +
            '<button class="btn" onclick="closeModal()">取消</button>' +
        '</div>';
    document.getElementById('modalOverlay').style.display = 'flex';
}

async function addType(){
    var n = document.getElementById('ft-name').value.trim();
    if(!n){ alert('请输入分类名称'); return; }
    try {
        await apiPost(API_DICT_TYPE, {id:'', name:n, dictionary_description:document.getElementById('ft-desc').value.trim()||null, is_system:'0'});
        closeModal();
        typeData = await apiGet(API_DICT_TYPE);
        renderTypeTree();
    } catch(e) { alert('创建失败: ' + e.message); }
}

async function updType(id){
    var n = document.getElementById('ft-name').value.trim();
    if(!n){ alert('请输入分类名称'); return; }
    try {
        await apiPut(API_DICT_TYPE+'/'+id, {name:n, dictionary_description:document.getElementById('ft-desc').value.trim()||null});
        closeModal();
        typeData = await apiGet(API_DICT_TYPE);
        renderTypeTree();
        if(activeType && activeType.id===id) { activeType = typeData.find(function(t){return t.id===id;}); await loadDicts(id); }
    } catch(e) { alert('更新失败: ' + e.message); }
}

async function delType(id){
    if(!confirm('确定删除该词条分类？分类下的词条将变为未分类。')) return;
    try { await apiDel(API_DICT_TYPE+'/'+id+'?soft=true'); typeData = await apiGet(API_DICT_TYPE); if(activeType&&activeType.id===id){ activeType=null; document.getElementById('mainBody').innerHTML='<div class="dict-empty">← 请选择左侧分类</div>'; } await refreshCounts(); renderTypeTree(); }
    catch(e) { alert('删除失败: ' + e.message); }
}

// ═══════════════════════════════════════════════
//  词条 增删改
// ═══════════════════════════════════════════════

function showDictForm(dictId){
    var isEdit = !!dictId;
    (async function(){
        var ex = {};
        if(isEdit){ try { ex = await apiGet(API_DICT+'/'+dictId); } catch(e){} }
        var typeOptions = typeData.map(function(t){ return '<option value="'+t.id+'"'+(ex.dictionary_type_id===t.id||(!isEdit&&activeType&&activeType.id===t.id)?' selected':'')+'>'+esc(t.name)+'</option>'; }).join('');
        document.getElementById('modalBox').innerHTML =
            '<h3>' + (isEdit ? '编辑词条' : '新建词条') + '</h3>' +
            '<label>词条编码</label>' +
            '<input id="f-code" value="' + esc(ex.code||'') + '" placeholder="词条编码（唯一标识）" maxlength="100" />' +
            '<label>词条名称 <span style="color:#ef4444;">*</span></label>' +
            '<input id="f-name" value="' + esc(ex.name||'') + '" placeholder="词条名称" maxlength="200" />' +
            '<label>所属分类</label>' +
            '<select id="f-typeid"><option value="">— 无 —</option>' + typeOptions + '</select>' +
            '<label>词条内容</label>' +
            '<textarea id="f-content" rows="8" placeholder="词条内容...">' + esc(ex.dictionary_content||'') + '</textarea>' +
            '<div class="btn-row">' +
                '<button class="btn btn-accent" onclick="' + (isEdit ? 'updDict(\x27'+dictId+'\x27)' : 'addDict()') + '">💾 保存</button>' +
                '<button class="btn" onclick="closeModal()">取消</button>' +
            '</div>';
        document.getElementById('modalOverlay').style.display = 'flex';
    })();
}

async function addDict(){
    var name = document.getElementById('f-name').value.trim();
    if(!name){ alert('请输入词条名称'); return; }
    try {
        await apiPost(API_DICT, {
            id: '', scene_id: 'SCENE_DEFAULT', name: name,
            code: document.getElementById('f-code').value.trim() || null,
            dictionary_type_id: document.getElementById('f-typeid').value || null,
            dictionary_content: document.getElementById('f-content').value.trim() || ''
        });
        closeModal(); await refreshCounts(); renderTypeTree();
        if(activeType) await loadDicts(activeType.id);
    } catch(e) { alert('创建失败: ' + e.message); }
}

async function updDict(dictId){
    var name = document.getElementById('f-name').value.trim();
    if(!name){ alert('请输入词条名称'); return; }
    try {
        await apiPut(API_DICT+'/'+dictId, {
            name: name,
            code: document.getElementById('f-code').value.trim() || null,
            dictionary_type_id: document.getElementById('f-typeid').value || null,
            dictionary_content: document.getElementById('f-content').value.trim() || ''
        });
        closeModal(); await refreshCounts(); renderTypeTree();
        if(activeType) await loadDicts(activeType.id);
    } catch(e) { alert('更新失败: ' + e.message); }
}

async function delDict(dictId){
    if(!confirm('确定删除该词条？')) return;
    try { await apiDel(API_DICT+'/'+dictId+'?soft=true'); await refreshCounts(); renderTypeTree(); if(activeType) await loadDicts(activeType.id); }
    catch(e) { alert('删除失败: ' + e.message); }
}

function closeModal(){ document.getElementById('modalOverlay').style.display = 'none'; }
</script>
{% endblock %}
