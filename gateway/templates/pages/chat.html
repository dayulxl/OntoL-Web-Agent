{% extends "base.html" %}

{% block title %}AI 对话 — LangGraph Cluster{% endblock %}

{% block extra_head %}
<style>
.chat-layout { display: flex; flex-direction: column; height: calc(100vh - 200px); }
.chat-messages { flex: 1; overflow-y: auto; padding: 1rem;
    background: rgba(10, 15, 40, 0.7); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; }
.msg { margin-bottom: 1rem; padding: 0.75rem 1rem; border-radius: 8px; max-width: 85%; line-height: 1.7; }
.msg.user { background: rgba(0, 212, 255, 0.2); color: #fff; margin-left: auto; border: 1px solid rgba(0, 212, 255, 0.25); }
.msg.assistant { background: rgba(17, 24, 72, 0.8); color: #e8ecf4; border: 1px solid var(--border); }
.msg .role { font-size: 0.75rem; font-weight: 700; margin-bottom: 0.25rem; opacity: 0.5; }
.msg .content { white-space: pre-wrap; word-break: break-word; }
.msg .content p { margin: 0.4rem 0; }
.msg .content h2,.msg .content h3 { color: var(--accent); margin: 0.8rem 0 0.3rem; }
.msg .content code { background: rgba(0,212,255,0.1); padding: 0.1rem 0.3rem; border-radius: 3px; font-size: 0.8rem; }
.msg .content pre { background: rgba(0,0,0,0.3); padding: 0.6rem; border-radius: 6px; overflow-x: auto; font-size: 0.78rem; border: 1px solid rgba(0,212,255,0.1); }

/* 推理步骤指示器 */
.pipeline-steps { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 0.6rem; }
.pipeline-step { font-size: 0.68rem; padding: 0.15rem 0.5rem; border-radius: 10px;
    background: rgba(0,212,255,0.06); border: 1px solid rgba(0,212,255,0.15); color: var(--text-dim); }
.pipeline-step.active { background: rgba(0,212,255,0.15); border-color: var(--accent); color: var(--accent); animation: pulse 1.5s infinite; }
.pipeline-step.done { background: rgba(34,197,94,0.12); border-color: #22c55e; color: #22c55e; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

/* 工具调用卡片 */
.tool-call { margin: 0.4rem 0; border: 1px solid rgba(245,158,11,0.2); border-radius: 6px; overflow: hidden; font-size: 0.75rem; }
.tool-call-header { padding: 0.3rem 0.6rem; background: rgba(245,158,11,0.1); cursor: pointer;
    display: flex; align-items: center; gap: 0.4rem; }
.tool-call-header .tool-icon { font-size: 0.85rem; }
.tool-call-header .tool-name { color: #f59e0b; font-weight: 600; }
.tool-call-header .tool-args { color: var(--text-dim); font-size: 0.7rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex:1; }
.tool-call-body { padding: 0.4rem 0.6rem; background: rgba(0,0,0,0.2); max-height: 160px; overflow-y: auto;
    font-family: monospace; font-size: 0.7rem; color: var(--text-dim); white-space: pre-wrap; word-break: break-all; display: none; }
.tool-call.open .tool-call-body { display: block; }
.tool-call-body::-webkit-scrollbar { width: 3px; }
.tool-call-body::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.12); border-radius: 2px; }

.chat-input-area { display: flex; gap: 0.5rem; }
.chat-input-area textarea { flex: 1; padding: 0.75rem; border: 1px solid var(--border);
    border-radius: 8px; font-size: 1rem; resize: none; font-family: inherit;
    background: rgba(10, 15, 40, 0.8); color: #e8ecf4; }
.chat-input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 10px var(--primary-glow); outline: none; }
.chat-input-area button { padding: 0.75rem 1.5rem; background: rgba(0, 212, 255, 0.15); color: var(--accent);
    border: 1px solid var(--accent); border-radius: 8px; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
.chat-input-area button:hover { background: rgba(0, 212, 255, 0.25); box-shadow: 0 0 16px var(--primary-glow); }
.chat-input-area button:disabled { opacity: 0.4; cursor: not-allowed; }
.chat-input-area button.stop { background: rgba(239, 68, 68, 0.15); border-color: #ef4444; color: #ef4444; display: none; }
.model-bar { display: flex; gap: 1rem; align-items: center; margin-bottom: 0.75rem; font-size: 0.85rem; color: #e8ecf4; }
.model-bar select { padding: 0.35rem 0.6rem; border: 1px solid var(--border); border-radius: 4px;
    background: rgba(10, 15, 40, 0.8); color: #e8ecf4; }
.streaming-indicator { display: none; color: #00d4ff; font-size: 0.8rem; margin-left: 0.5rem; }
</style>
{% endblock %}

{% block content %}
<h1>AI 对话</h1>

<div class="model-bar">
    <label>模型:
        <select id="model-select">
            {% for group in model_groups %}
            <optgroup label="{{ group.label }}">
                {% for m in group.models %}
                <option value="{{ m.name }}" {% if m.name == default_model %}selected{% endif %}>
                    {{ m.display }}
                </option>
                {% endfor %}
            </optgroup>
            {% endfor %}
        </select>
    </label>
    <span id="streaming-indicator" class="streaming-indicator">● 生成中...</span>
</div>

<div class="chat-layout">
    <div id="messages" class="chat-messages"></div>
    <div class="chat-input-area">
        <textarea id="input" rows="2" placeholder="输入消息，Enter 发送，Shift+Enter 换行"
                  onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();send()}"></textarea>
        <button id="send-btn" onclick="send()">发送</button>
        <button id="stop-btn" class="stop" onclick="stop()">停止</button>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let abortController = null;
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const stopBtn = document.getElementById('stop-btn');
const indicator = document.getElementById('streaming-indicator');
const modelSelect = document.getElementById('model-select');

let history = [];
const PIPELINE_STEPS = ['意图解析','知识检索','推理校验','图遍历','步骤生成','自校验','方案输出'];
let currentStepIdx = -1;
let activeToolCalls = {};  // track open tool calls by some id

function renderMsg(role, content) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const roleName = role === 'user' ? '你' : 'AI';
    // Add pipeline steps bar for assistant messages
    const stepsBar = role === 'assistant'
        ? `<div class="pipeline-steps">${PIPELINE_STEPS.map((s,i) =>
            `<span class="pipeline-step" id="step-${i}">${i+1}.${s}</span>`).join('')}</div>`
        : '';
    div.innerHTML = `<div class="role">${roleName}</div>${stepsBar}<div class="content"></div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
}

function markStep(idx, state) {
    const el = document.getElementById('step-' + idx);
    if (el) el.className = 'pipeline-step ' + state;
}

// Map tool names to pipeline step indices
function toolStepIndex(toolName) {
    const map = {
        'search_knowledge_graph': 1,   // 知识检索
        'search_ontology_models': 1,
        'get_ontology_tree': 1,
        'get_model_detail': 1,
        'call_reasoner': 2,            // 推理校验
        'list_reasoner_tools': 2,
        'traverse_graph': 3,           // 图遍历
    };
    return map[toolName] !== undefined ? map[toolName] : -1;
}

async function send() {
    const text = inputEl.value.trim();
    if (!text || abortController) return;
    inputEl.value = '';
    inputEl.disabled = true;
    sendBtn.disabled = true;
    stopBtn.style.display = 'inline-block';
    indicator.style.display = 'inline';
    currentStepIdx = -1;
    activeToolCalls = {};

    renderMsg('user', text);
    const assistantDiv = renderMsg('assistant', '');
    const contentEl = assistantDiv.querySelector('.content');
    const stepsBar = assistantDiv.querySelector('.pipeline-steps');

    abortController = new AbortController();
    try {
        const resp = await fetch('/api/v1/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ messages: [...history, {role:'user',content:text}], model: modelSelect.value }),
            signal: abortController.signal,
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let full = '';
        let buffer = '';

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buffer += decoder.decode(value, { stream: true });

            for (const line of buffer.split('\n')) {
                if (!line.startsWith('data: ')) continue;
                const data = line.slice(6);
                if (data === '[DONE]') continue;

                try {
                    const event = JSON.parse(data);
                    const type = event.type;

                    if (type === 'content') {
                        // Stream text content — render as markdown-like
                        full += event.content || '';
                        contentEl.innerHTML = formatMarkdown(full);
                        messagesEl.scrollTop = messagesEl.scrollHeight;

                        // Advance steps based on content
                        if (full.includes('目标理解') && currentStepIdx < 0) { currentStepIdx = 0; markStep(0, 'done'); }
                        if ((full.includes('知识依据') || full.includes('图谱')) && currentStepIdx < 1) {
                            markStep(0, 'done'); markStep(1, 'active'); currentStepIdx = 1;
                        }
                        if (full.includes('执行步骤') && currentStepIdx < 4) {
                            for (let i = 0; i <= 4; i++) markStep(i, 'done');
                            markStep(5, 'active'); currentStepIdx = 5;
                        }
                        if ((full.includes('风险') || full.includes('假设')) && currentStepIdx < 6) {
                            for (let i = 0; i <= 6; i++) markStep(i, 'done');
                            currentStepIdx = 6;
                        }

                    } else if (type === 'tool_call') {
                        const toolName = event.tool || 'unknown';
                        const stepIdx = toolStepIndex(toolName);
                        if (stepIdx >= 0) {
                            for (let i = 0; i < stepIdx; i++) markStep(i, 'done');
                            markStep(stepIdx, 'active');
                            currentStepIdx = stepIdx;
                        }
                        // Create tool call card
                        const card = document.createElement('div');
                        card.className = 'tool-call';
                        card.id = 'tc-' + toolName + '-' + Date.now();
                        const argsStr = JSON.stringify(event.args || {}).substring(0, 80);
                        card.innerHTML = `<div class="tool-call-header" onclick="this.parentElement.classList.toggle('open')">
                            <span class="tool-icon">🔧</span>
                            <span class="tool-name">${escHtml(toolName)}</span>
                            <span class="tool-args">${escHtml(argsStr)}</span>
                            <span style="font-size:0.65rem;opacity:0.5;">▶</span>
                        </div>
                        <div class="tool-call-body"><div class="ot-spinner" style="width:12px;height:12px;margin:0.3rem;"></div></div>`;
                        contentEl.appendChild(card);

                    } else if (type === 'tool_result') {
                        const toolName = event.tool || 'unknown';
                        // Find the last matching tool card and update it
                        const cards = contentEl.querySelectorAll('.tool-call');
                        for (let i = cards.length - 1; i >= 0; i--) {
                            if (cards[i].querySelector('.tool-name').textContent === toolName &&
                                cards[i].querySelector('.tool-call-body').textContent.includes('')) {
                                const body = cards[i].querySelector('.tool-call-body');
                                const result = event.result || '';
                                body.textContent = result.length > 800 ? result.substring(0, 800) + '...(截断)' : result;
                                break;
                            }
                        }
                        if (toolStepIndex(toolName) >= 0) markStep(toolStepIndex(toolName), 'done');

                    } else if (type === 'error') {
                        contentEl.innerHTML += `<div style="color:#ef4444;padding:0.5rem;">❌ ${escHtml(event.error)}</div>`;
                    }
                } catch(e) {
                    // Skip malformed JSON
                }
            }
            buffer = ''; // reset buffer after processing
        }
        // Mark all steps done
        for (let i = 0; i < PIPELINE_STEPS.length; i++) markStep(i, 'done');

        history.push({role:'user',content:text}, {role:'assistant',content:full});
        if (history.length > 40) history = history.slice(-40);
    } catch (e) {
        if (e.name !== 'AbortError') {
            contentEl.innerHTML += `<div style="color:#ef4444;padding:0.5rem;">❌ ${escHtml(e.message)}</div>`;
        }
    } finally {
        abortController = null;
        inputEl.disabled = false;
        sendBtn.disabled = false;
        stopBtn.style.display = 'none';
        indicator.style.display = 'none';
    }
}

function stop() {
    if (abortController) { abortController.abort(); abortController = null; }
}

// Simple markdown formatter for the final output
function formatMarkdown(text) {
    return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/\*\*(.+?)\*\*/g, '<b>$1</b>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^- (.+)$/gm, '• $1')
        .replace(/^(\d+)\. (.+)$/gm, '$1. $2')
        .replace(/\n/g, '<br>');
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

inputEl.focus();
</script>
{% endblock %}
